name: test
on: pull_request

permissions:
  checks: write     # post the Check Run
  contents: read
  id-token: write   # upload the report to lumitrace.atdot.net

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # default shallow; setup fetches the PR base itself

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"   # lumitrace needs Ruby 3.4+
          bundler-cache: true

      - uses: ko1/lumitrace/action/setup@v1
        with:
          collect-mode: last   # demo: show recorded values

      # Tests split across TWO steps on purpose — lumitrace merges the traces
      # from both into one report (each step traces different code paths).
      - run: bin/rails test test/models/cart_test.rb
      - run: bin/rails test test/models/cart_pricing_test.rb

      - uses: ko1/lumitrace/action/report@v1
        if: always()
