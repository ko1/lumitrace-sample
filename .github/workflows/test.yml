name: test
on: pull_request

permissions:
  checks: write     # post the Check Run
  contents: read
  id-token: write   # upload the report to lumitrace.atdot.net

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # default shallow; setup fetches the PR base itself

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"   # lumitrace needs Ruby 3.4+
          bundler-cache: true

      # --- lumitrace: bracket the existing test step, command unchanged ---
      - uses: ko1/lumitrace/action/setup@v1   # default collect-mode: types (no raw values)

      - run: bin/rails test

      - uses: ko1/lumitrace/action/report@v1
        if: always()
