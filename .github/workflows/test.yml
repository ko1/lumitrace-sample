name: test
on: pull_request

permissions:
  checks: write     # let the report action post the Check Run
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Needed only until ko1/lumitrace#3 (setup fetches the base itself)
          # lands and a v1 tag is cut; then this line can be removed.
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"   # lumitrace needs Ruby 3.4+
          bundler-cache: true

      - run: bin/rails db:test:prepare   # before tracing, so it isn't traced

      # --- lumitrace: bracket the existing test step, command unchanged ---
      - uses: ko1/lumitrace/action/setup@master   # switch to @v1 once tagged
        with:
          collect-mode: last   # demo: show recorded values

      - run: bin/rails test

      - uses: ko1/lumitrace/action/report@master
        if: always()
