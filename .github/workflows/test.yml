name: test
on: pull_request

permissions:
  checks: write     # let the report action post the Check Run
  contents: read
  id-token: write   # OIDC token to authenticate the report upload

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # default shallow; setup fetches the PR base itself

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"   # lumitrace needs Ruby 3.4+
          bundler-cache: true

      # --- lumitrace: bracket the existing test step, command unchanged ---
      - uses: ko1/lumitrace/action/setup@v1
        with:
          collect-mode: last   # demo: show recorded values

      - run: bin/rails test
        env:
          LUMITRACE_VERBOSE: "2"   # TEMP: diagnose why 0 expressions traced in CI

      - uses: ko1/lumitrace/action/report@v1
        if: always()   # id-token: write above uploads the report to lumitrace.atdot.net
