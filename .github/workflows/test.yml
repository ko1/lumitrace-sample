name: test
on: pull_request

permissions:
  checks: write
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [cart, coupon]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - uses: ko1/lumitrace-action/setup@v1

      - run: bin/rails test test/models/${{ matrix.shard }}_test.rb

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lumitrace-results-${{ matrix.shard }}
          path: ${{ env.LUMITRACE_RESULTS_DIR }}
          include-hidden-files: true
          if-no-files-found: ignore

  lumitrace:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: lumitrace-results-*
          path: lumitrace-results

      - uses: ko1/lumitrace-action/merge@v1
        with:
          results-dir: lumitrace-results
